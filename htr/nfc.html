<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Chuyển Tiếp Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ngăn chặn việc bôi đen text khi bấm liên tục trên điện thoại */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        /* Đảm bảo hình nền lặp lại mượt mà */
        #bg-pattern {
            background-repeat: repeat;
        }
    </style>
</head>
<body id="app-body" class="flex items-center justify-center min-h-screen relative font-sans transition-all duration-700">

    <!-- Lớp phủ họa tiết nền mờ -->
    <div id="bg-pattern" class="absolute inset-0 z-0 pointer-events-none transition-all duration-700"></div>

    <!-- Nút Menu (Góc trên bên trái) - Chỉ dùng để mở đổi chủ đề bình thường -->
    <div id="secret-trigger" class="absolute top-4 left-4 p-3 cursor-pointer no-select rounded-full bg-black/10 hover:bg-black/20 backdrop-blur-sm transition-colors z-20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white mix-blend-difference" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
    </div>

    <!-- Khung hiển thị chính cho người quét NFC -->
    <div id="app-card" class="p-8 w-full max-w-sm mx-4 text-center transition-all duration-500 z-10">
        <!-- ICON TRUNG TÂM: Đây là chỗ ẩn để bấm 3 lần mở khóa link -->
        <div id="app-icon" class="mb-4 text-6xl drop-shadow-md transition-transform hover:scale-110 cursor-pointer no-select" title="Bấm 3 lần để sửa link">👋</div>
        
        <h1 id="app-greeting" class="text-2xl font-bold mb-2">Xin chào bạn!</h1>
        <p id="app-desc" class="mb-6">Bạn có muốn tiếp tục đi tới đường link dưới đây không?</p>
        
        <!-- Hiển thị link hiện tại -->
        <div id="link-box" class="p-3 mb-8 overflow-hidden border rounded-lg shadow-inner">
            <p id="display-link" class="font-medium truncate text-sm">Đang tải...</p>
        </div>

        <button id="open-link-btn" class="w-full font-bold py-4 px-6 shadow-lg transition-transform transform active:scale-95">
            Mở Link Ngay
        </button>
    </div>

    <!-- Bảng điều khiển ẩn -->
    <div id="admin-panel" class="hidden absolute inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl transform transition-all">
            <div class="flex items-center justify-between mb-6">
                <h2 id="panel-title" class="text-2xl font-bold text-gray-800">⚙️    Cài đặt  </h2>
            </div>
            
            <label class="block text-left text-sm font-bold text-gray-700 mb-1">Chủ đề giao diện</label>
            <select id="theme-select" class="w-full p-3 border border-gray-300 rounded-xl mb-6 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition-shadow cursor-pointer">
                <!-- Sẽ được thêm bằng Javascript -->
            </select>

            <!-- Phần đổi link bị ẩn đi, chỉ hiện khi nhập đúng pass -->
            <div id="secret-link-section" class="hidden mb-6">
                <div class="border-t border-gray-200 pt-4 mb-4">
                    <span class="inline-block bg-red-100 text-red-600 text-xs font-bold px-2 py-1 rounded mb-2">QUYỀN QUẢN TRỊ VIÊN 🤫</span>
                    <label class="block text-left text-sm font-bold text-gray-700 mb-1">Đường link đích mới</label>
                    <input type="url" id="new-link-input" placeholder="https://ví-dụ.com" class="w-full p-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition-shadow">
                </div>
            </div>
            
            <div class="flex gap-3">
                <button id="cancel-btn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-xl transition-colors">
                    Đóng
                </button>
                <button id="save-btn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors">
                    Lưu Lại
                </button>
            </div>
        </div>
    </div>

    <!-- Popup Nhập Mật Khẩu (Thay thế cho hộp thoại prompt mặc định) -->
    <div id="password-modal" class="hidden absolute inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-[60]">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl transform transition-all text-center">
            <div class="text-4xl mb-4">🔐</div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Quyền Quản Trị</h2>
            <p class="text-sm text-gray-500 mb-6">Vui lòng nhập mật khẩu để tiếp tục.</p>
            
            <input type="password" id="modal-password-input" placeholder="Nhập mật khẩu..." class="w-full p-3 border border-gray-300 rounded-xl mb-6 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none text-center text-lg tracking-widest shadow-inner">
            
            <div class="flex gap-3">
                <button id="close-password-btn" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-xl transition-colors">
                    Hủy
                </button>
                <button id="confirm-password-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-colors">
                    Xác Nhận
                </button>
            </div>
        </div>
    </div>

    <!-- Thông báo nhỏ (Toast) -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 text-white px-6 py-3 rounded-full transition-opacity duration-300 pointer-events-none z-50 opacity-0 shadow-xl font-bold">
        Thông báo!
    </div>

    <script>
        // --- BỘ CẤU HÌNH CÁC CHỦ ĐỀ VÀ HỌA TIẾT NỀN (PATTERN) ---
        const THEMES = {
            'default': {
                name: 'Mặc định (Trắng/Xanh)',
                bg: 'bg-gray-200',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='2' fill='%23000' fill-opacity='0.08'/%3E%3C/svg%3E\")", // Ô lưới chấm bi
                card: 'bg-white rounded-2xl shadow-xl',
                btn: 'bg-blue-600 hover:bg-blue-700 text-white rounded-xl',
                icon: '👋',
                greeting: 'Xin chào bạn!',
                desc: 'Bạn có muốn tiếp tục đi tới đường link dưới đây không?',
                btnText: 'Mở Link Ngay',
                textColor: 'text-gray-800',
                descColor: 'text-gray-600',
                linkBox: 'bg-blue-50 border-blue-100 rounded-lg',
                linkColor: 'text-blue-600'
            },
            'spiderman': {
                name: 'Người Nhện 🕷️',
                bg: 'bg-red-600',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0l20 20M20 0L0 20' stroke='%23000' stroke-width='1' stroke-opacity='0.2'/%3E%3C/svg%3E\")", // Lưới tơ nhện chéo
                card: 'bg-white rounded-lg border-4 border-blue-700 shadow-2xl',
                btn: 'bg-blue-700 hover:bg-blue-800 text-white rounded-md border-b-4 border-red-600',
                icon: '🕷️',
                greeting: 'Chào Người Nhện!',
                desc: 'Sẵn sàng phóng tơ đến trang mới chưa?',
                btnText: 'Phóng Tơ Ngay 🕸️',
                textColor: 'text-red-700',
                descColor: 'text-gray-700',
                linkBox: 'bg-red-50 border-red-200 rounded-lg',
                linkColor: 'text-blue-700'
            },
            'suncloud': {
                name: 'Mây & Mặt Trời ⛅',
                bg: 'bg-sky-300',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='15' fill='%23fff' fill-opacity='0.3'/%3E%3C/svg%3E\")", // Những cụm mây tròn
                card: 'bg-white/90 backdrop-blur-md rounded-3xl shadow-xl',
                btn: 'bg-yellow-400 hover:bg-yellow-500 text-yellow-900 rounded-full shadow-lg',
                icon: '☀️',
                greeting: 'Chào ngày mới!',
                desc: 'Cùng bay lên những đám mây',
                btnText: 'Bay Lên Nào ☁️',
                textColor: 'text-sky-900',
                descColor: 'text-sky-800',
                linkBox: 'bg-white/60 border-sky-200 rounded-2xl',
                linkColor: 'text-sky-900'
            },
            'stars': {
                name: 'Các Vì Sao ✨',
                bg: 'bg-gray-900',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='1.5' fill='%23fff' fill-opacity='0.3'/%3E%3Cpath d='M30 25v10M25 30h10' stroke='%23fff' stroke-width='1' stroke-opacity='0.3'/%3E%3C/svg%3E\")", // Vũ trụ sao đêm
                card: 'bg-gray-800 rounded-2xl shadow-[0_0_30px_rgba(255,255,255,0.1)] border border-gray-700',
                btn: 'bg-purple-600 hover:bg-purple-700 text-white rounded-xl shadow-[0_0_15px_rgba(147,51,234,0.5)]',
                icon: '🚀',
                greeting: 'Chào Phi Hành Gia!',
                desc: 'Tàu vũ trụ đã sẵn sàng khởi hành đến tọa độ mới.',
                btnText: 'Bay Khỏi Trái Đất ✨',
                textColor: 'text-gray-100',
                descColor: 'text-gray-400',
                linkBox: 'bg-gray-700 border-gray-600 rounded-lg',
                linkColor: 'text-purple-400'
            },
            'birthday': {
                name: 'Sinh Nhật 🎂',
                bg: 'bg-yellow-100',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='30' height='30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30L30 0' stroke='%23ff69b4' stroke-width='4' stroke-dasharray='4 4' stroke-opacity='0.3'/%3E%3C/svg%3E\")", // Confetti sinh nhật pháo giấy
                card: 'bg-white rounded-3xl border-4 border-dashed border-pink-300 shadow-xl',
                btn: 'bg-pink-500 hover:bg-pink-600 text-white rounded-full animate-bounce shadow-pink-300/50 shadow-lg',
                icon: '🎁',
                greeting: 'HAPPY BIRTHDAY!',
                desc: 'Một món quà bất ngờ đang chờ bạn đấy!',
                btnText: 'Mở Quà Ngay 🎉',
                textColor: 'text-pink-600',
                descColor: 'text-pink-500',
                linkBox: 'bg-pink-50 border-pink-200 rounded-xl',
                linkColor: 'text-pink-600'
            },
            'clover': {
                name: 'Cỏ 4 Lá 🍀',
                bg: 'bg-green-100',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='4' fill='%23008000' fill-opacity='0.15'/%3E%3Ccircle cx='14' cy='10' r='4' fill='%23008000' fill-opacity='0.15'/%3E%3C/svg%3E\")", // Những chiếc lá mờ chìm
                card: 'bg-white rounded-2xl border-2 border-green-400 shadow-xl',
                btn: 'bg-green-600 hover:bg-green-700 text-white rounded-xl shadow-lg',
                icon: '🍀',
                greeting: 'Ngày May Mắn!',
                desc: 'Thử vận may của bạn',
                btnText: 'Bắt Lấy May Mắn 🌟',
                textColor: 'text-green-800',
                descColor: 'text-green-700',
                linkBox: 'bg-green-50 border-green-200 rounded-lg',
                linkColor: 'text-green-700'
            },
            'flowers': {
                name: 'Các Loại Hoa 🌸',
                bg: 'bg-pink-100',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='30' height='30' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='15' cy='10' r='5' fill='%23ff1493' fill-opacity='0.1'/%3E%3Ccircle cx='10' cy='15' r='5' fill='%23ff1493' fill-opacity='0.1'/%3E%3Ccircle cx='20' cy='15' r='5' fill='%23ff1493' fill-opacity='0.1'/%3E%3C/svg%3E\")", // Những cánh hoa nhỏ
                card: 'bg-white/80 backdrop-blur rounded-3xl shadow-xl',
                btn: 'bg-rose-500 hover:bg-rose-600 text-white rounded-full shadow-md border-2 border-white',
                icon: '🌷',
                greeting: 'Chào Bạn Hoa Nhỏ!',
                desc: 'Bước vào khu vườn bí mật qua đường dẫn này nhé.',
                btnText: 'Khám Phá Vườn Hoa 🌺',
                textColor: 'text-rose-700',
                descColor: 'text-rose-600',
                linkBox: 'bg-rose-50 border-rose-200 rounded-2xl',
                linkColor: 'text-rose-600'
            },
            'tet': {
                name: 'Pháo Hoa / Tết 🎆',
                bg: 'bg-red-700',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='24' height='24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 0L24 12L12 24L0 12Z' fill='%23ffd700' fill-opacity='0.15'/%3E%3C/svg%3E\")", // Đồng tiền vàng/ Hình thoi may mắn
                card: 'bg-yellow-50 rounded-xl border-4 border-yellow-500 shadow-2xl',
                btn: 'bg-yellow-500 hover:bg-yellow-600 text-red-800 rounded-lg font-extrabold shadow-xl',
                icon: '🧧',
                greeting: 'Chúc Mừng Năm Mới!',
                desc: 'Cùng đón xem những điều thú vị trong năm nay.',
                btnText: 'Khai Xuân Ngay 🧨',
                textColor: 'text-red-700',
                descColor: 'text-red-600',
                linkBox: 'bg-red-100 border-red-300 rounded-lg',
                linkColor: 'text-red-700'
            },
            'noel': {
                name: 'Giáng Sinh 🎄',
                bg: 'bg-green-800',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='30' height='30' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='5' cy='5' r='2' fill='%23fff' fill-opacity='0.3'/%3E%3Ccircle cx='20' cy='20' r='3' fill='%23fff' fill-opacity='0.3'/%3E%3C/svg%3E\")", // Tuyết rơi
                card: 'bg-red-50 rounded-2xl border-4 border-red-500 shadow-2xl',
                btn: 'bg-red-600 hover:bg-red-700 text-white rounded-xl shadow-lg',
                icon: '🎅',
                greeting: 'Merry Christmas!',
                desc: 'Ông già Noel đã để lại một món quà cho bạn.',
                btnText: 'Xem Quà Noel 🎁',
                textColor: 'text-green-800',
                descColor: 'text-green-700',
                linkBox: 'bg-green-100 border-green-300 rounded-lg',
                linkColor: 'text-green-800'
            },
            'love': {
                name: 'Tình Yêu / Valentine ❤️',
                bg: 'bg-pink-200',
                pattern: "url(\"data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 35l-15-15a10.6 10.6 0 0 1 15-15 10.6 10.6 0 0 1 15 15z' fill='%23ff0000' fill-opacity='0.08'/%3E%3C/svg%3E\")", // Trái tim chìm mờ ảo
                card: 'bg-white rounded-3xl shadow-pink-300/50 shadow-2xl',
                btn: 'bg-red-500 hover:bg-red-600 text-white rounded-full shadow-lg hover:shadow-red-400/50',
                icon: '💌',
                greeting: 'Chào Tình Yêu!',
                desc: 'Có một lời nhắn nhủ dễ thương đang chờ bạn.',
                btnText: 'Mở Lời Yêu Thương ❤️',
                textColor: 'text-red-600',
                descColor: 'text-red-500',
                linkBox: 'bg-pink-50 border-pink-200 rounded-full text-center px-4',
                linkColor: 'text-red-500'
            }
        };

        // --- CẤU HÌNH CƠ BẢN ---
        const DEFAULT_LINK = "https://google.com";
        const PASSWORD_OWNER = "thanhlocle"; // Mật khẩu đổi link
        
        let currentLink = localStorage.getItem('nfc_target_link') || DEFAULT_LINK;
        let currentTheme = localStorage.getItem('nfc_theme') || 'default';
        
        let iconClickCount = 0;
        let iconClickTimer = null;

        // Các class mặc định cho layout
        const baseBodyClass = "flex items-center justify-center min-h-screen relative font-sans transition-all duration-700";
        const baseCardClass = "p-8 w-full max-w-sm mx-4 text-center transition-all duration-500 z-10";
        const baseBtnClass = "w-full font-bold py-4 px-6 transition-transform transform active:scale-95";
        const baseLinkBoxClass = "p-3 mb-8 overflow-hidden border";

        // Khởi tạo các thành phần giao diện
        const themeSelect = document.getElementById('theme-select');
        const adminPanel = document.getElementById('admin-panel');
        const newLinkInput = document.getElementById('new-link-input');
        const toast = document.getElementById('toast');
        const bgPattern = document.getElementById('bg-pattern');

        // Khởi tạo các thành phần của popup mật khẩu
        const passwordModal = document.getElementById('password-modal');
        const modalPasswordInput = document.getElementById('modal-password-input');
        const closePasswordBtn = document.getElementById('close-password-btn');
        const confirmPasswordBtn = document.getElementById('confirm-password-btn');

        // Nạp danh sách chủ đề vào Thẻ Select
        for (const key in THEMES) {
            const opt = document.createElement('option');
            opt.value = key;
            opt.textContent = THEMES[key].name;
            themeSelect.appendChild(opt);
        }

        // Hàm áp dụng chủ đề (Kèm theo đổi Pattern nền)
        function applyTheme(themeKey) {
            const t = THEMES[themeKey] || THEMES['default'];
            
            document.getElementById('app-body').className = baseBodyClass + ' ' + t.bg;
            document.getElementById('app-card').className = baseCardClass + ' ' + t.card;
            document.getElementById('open-link-btn').className = baseBtnClass + ' ' + t.btn;
            
            // Thay đổi họa tiết nền chìm
            bgPattern.style.backgroundImage = t.pattern;
            
            document.getElementById('app-icon').textContent = t.icon;
            
            const greetingEl = document.getElementById('app-greeting');
            greetingEl.textContent = t.greeting;
            greetingEl.className = `text-2xl font-bold mb-2 ${t.textColor}`;
            
            const descEl = document.getElementById('app-desc');
            descEl.textContent = t.desc;
            descEl.className = `mb-6 ${t.descColor}`;
            
            document.getElementById('open-link-btn').textContent = t.btnText;

            const linkBoxEl = document.getElementById('link-box');
            linkBoxEl.className = baseLinkBoxClass + ' ' + t.linkBox;
            
            const displayLinkEl = document.getElementById('display-link');
            displayLinkEl.className = `font-medium truncate text-sm ${t.linkColor}`;
        }

        // Cập nhật lại Link hiển thị
        function updateUI() {
            document.getElementById('display-link').textContent = currentLink;
        }

        // Chạy lần đầu tiên
        updateUI();
        applyTheme(currentTheme);
        themeSelect.value = currentTheme;

        // 1. Mở link
        document.getElementById('open-link-btn').addEventListener('click', () => {
            window.location.href = currentLink;
        });

        // 2. Mở bảng điều khiển (Chỉ cần ấn 1 lần vào nút 3 gạch trên cùng góc trái)
        // Dùng để đổi chủ đề, không có ô sửa link
        document.getElementById('secret-trigger').addEventListener('click', () => {
            adminPanel.classList.remove('hidden');
            newLinkInput.value = currentLink; 
            themeSelect.value = currentTheme;
            // Luôn ẩn phần đổi link
            document.getElementById('secret-link-section').classList.add('hidden');
        });

        // 3. CHỨC NĂNG BÍ MẬT QUẢN TRỊ: 
        // Bấm 3 lần liên tiếp vào BIỂU TƯỢNG (Icon lớn) để mở khóa đổi link
        document.getElementById('app-icon').addEventListener('click', () => {
            iconClickCount++;
            clearTimeout(iconClickTimer);
            
            // Đặt lại số đếm nếu dừng click quá 1 giây
            iconClickTimer = setTimeout(() => { iconClickCount = 0; }, 1000);

            if (iconClickCount === 3) {
                iconClickCount = 0; // Reset đếm
                
                // Mở popup nhập mật khẩu thay vì dùng prompt
                passwordModal.classList.remove('hidden');
                modalPasswordInput.value = '';
                
                // Cố gắng focus vào ô nhập
                setTimeout(() => modalPasswordInput.focus(), 100);
            }
        });

        // Xử lý nút Hủy trong popup mật khẩu
        closePasswordBtn.addEventListener('click', () => {
            passwordModal.classList.add('hidden');
        });

        // Xử lý xác nhận mật khẩu
        function checkPassword() {
            let pass = modalPasswordInput.value;
            
            if (pass === PASSWORD_OWNER) {
                // Tắt popup pass, Mở bảng cài đặt
                passwordModal.classList.add('hidden');
                adminPanel.classList.remove('hidden');
                
                // HIỆN thêm phần chỉnh sửa link
                document.getElementById('secret-link-section').classList.remove('hidden');
                
                newLinkInput.value = currentLink;
                themeSelect.value = currentTheme;
                
                showToast('Đã mở khóa quyền quản trị!', 'bg-green-600');
                newLinkInput.focus();
            } else if (pass !== "") {
                showToast('Sai mật khẩu!', 'bg-red-600');
                modalPasswordInput.value = '';
                modalPasswordInput.focus();
            }
        }

        confirmPasswordBtn.addEventListener('click', checkPassword);
        
        // Nhấn Enter trong ô mật khẩu để xác nhận
        modalPasswordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // 4. Đóng bảng cài đặt
        document.getElementById('cancel-btn').addEventListener('click', () => {
            adminPanel.classList.add('hidden');
        });

        // 5. Xử lý logic Lưu lại
        document.getElementById('save-btn').addEventListener('click', () => {
            let newUrl = newLinkInput.value.trim();
            let selectedTheme = themeSelect.value;
            let isLinkSectionVisible = !document.getElementById('secret-link-section').classList.contains('hidden');

            // Xử lý đổi chủ đề (Ai cũng được đổi)
            if (currentTheme !== selectedTheme) {
                currentTheme = selectedTheme;
                localStorage.setItem('nfc_theme', currentTheme);
                applyTheme(currentTheme);
            }

            // Xử lý đổi link (Chỉ lưu nếu phần sửa link đang hiển thị)
            if (isLinkSectionVisible && newUrl !== currentLink && newUrl !== "") {
                if (!newUrl.startsWith('http://') && !newUrl.startsWith('https://')) {
                    newUrl = 'https://' + newUrl;
                }
                currentLink = newUrl;
                localStorage.setItem('nfc_target_link', currentLink);
                updateUI(); 
                showToast('Đã lưu chủ đề và cập nhật link mới!', 'bg-green-600');
            } else {
                // Trường hợp chỉ đổi chủ đề
                showToast('Đã lưu cấu hình thành công!', 'bg-green-600');
            }
            
            adminPanel.classList.add('hidden');
        });

        // Hàm hiển thị thông báo góc dưới
        function showToast(msg, bgClass) {
            toast.textContent = msg;
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 text-white px-6 py-3 rounded-full transition-opacity duration-300 pointer-events-none z-50 opacity-0 shadow-xl font-bold ${bgClass}`;
            
            // Xóa class opacity-0 để hiện ra
            setTimeout(() => {
                toast.classList.remove('opacity-0');
            }, 10);

            // Tự ẩn sau 3.5 giây
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3500);
        }
    </script>
</body>
</html>
